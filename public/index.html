<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code — Transcript Viewer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%E2%9C%BB%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- GitHub corner — links back to the repository -->
  <a href="https://github.com/ly4096x/ClaudeCodeTranscriptViewer" class="github-corner"
     aria-label="View source on GitHub" target="_blank" rel="noreferrer noopener">
    <!-- bottom-right triangle + the upright GitHub octocat mark (octicon, MIT) -->
    <svg width="64" height="64" viewBox="0 0 250 250" aria-hidden="true">
      <path d="M0,250 L250,0 L250,250 Z"></path>
      <path class="octo-mark" fill="currentColor" transform="translate(144,144) scale(5.4)"
        d="M8 0C3.58 0 0 3.58 0 7.59c0 3.36 2.29 6.21 5.47 7.22.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 7.59C16 3.58 12.42 0 8 0z"></path>
    </svg>
  </a>

  <!-- Landing / drop zone, shown only until a transcript is loaded -->
  <div id="landing" class="landing">
    <div class="landing-box">
      <div class="welcome-line"><span class="spark">✻</span> Welcome to Claude&nbsp;Code Transcript&nbsp;viewer</div>
      <div class="landing-sub">Load a <code>.jsonl</code> session to replay it.</div>
      <label id="dropzone" class="dropzone" for="fileInput">
        <div class="dz-icon">⏏</div>
        <div class="dz-main">Drop a <code>.jsonl</code> transcript here</div>
        <div class="dz-or">or click to choose a file</div>
        <input id="fileInput" type="file" accept=".jsonl,.json,.ndjson,application/x-ndjson" hidden />
      </label>
      <div id="landingError" class="landing-error" hidden></div>
      <div class="landing-hint">
        Tip: start the server with <code>node server.js path/to/session.jsonl</code> to auto-load.
      </div>
    </div>
  </div>

  <!-- Left sidebar: index of the user's own prompts -->
  <aside id="sidebar" class="sidebar" hidden>
    <nav id="sidebarList" class="sidebar-list"></nav>
    <div id="sidebarResizer" class="sidebar-resizer" title="Drag to resize"></div>
  </aside>
  <!-- fold flag, sits outside the sidebar at the top edge -->
  <button id="sidebarToggle" class="sidebar-toggle" title="Collapse/expand sidebar" hidden>◀</button>

  <!-- Transcript view -->
  <main id="view" class="view" hidden>
    <div id="transcript" class="transcript"></div>
    <div id="loadMoreBar" class="load-more-bar" hidden>
      <button id="loadMoreBtn" class="load-more-btn"></button>
    </div>
  </main>

  <!-- Floating controls (kept out of the way; not a statusline) -->
  <button id="selectBtn" class="reload-btn" title="Selective mode — pick items to show" hidden>☑ select</button>
  <button id="searchBtn" class="reload-btn" title="Search (Ctrl/Cmd+F)" hidden>⌕ find</button>
  <button id="reloadBtn" class="reload-btn" title="Load another transcript" hidden>＋ load</button>

  <!-- Selective-mode action bar -->
  <div id="selectBar" class="search-bar select-bar" hidden>
    <span id="selCount" class="search-count">0 selected</span>
    <button id="selAll" class="search-nav search-toggle" title="Select every item">all</button>
    <button id="selNone" class="search-nav search-toggle" title="Clear the selection">none</button>
    <button id="selApply" class="search-nav search-toggle" title="Show only the selected items">show selected</button>
    <button id="selEdit" class="search-nav search-toggle" title="Back to picking items" hidden>edit selection</button>
    <span class="search-sep"></span>
    <button id="selExit" class="search-nav" title="Back to normal mode">✕</button>
  </div>

  <!-- In-conversation find bar -->
  <div id="searchBar" class="search-bar" hidden>
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="search" placeholder="Search conversation…" autocomplete="off" spellcheck="false" />
    <button id="searchCase" class="search-nav search-toggle" title="Case sensitive">Aa</button>
    <button id="searchRegex" class="search-nav search-toggle" title="Regular expression">.*</button>
    <span class="search-sep"></span>
    <span id="searchScopes" class="search-scopes" title="Which content to search"></span>
    <span id="searchCount" class="search-count">0/0</span>
    <button id="searchPrev" class="search-nav" title="Previous (Shift+Enter)">↑</button>
    <button id="searchNext" class="search-nav" title="Next (Enter)">↓</button>
    <button id="searchClose" class="search-nav" title="Close (Esc)">✕</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
